# Pre-built images are published to ghcr.io/ch3w3y/parsnip-ai/*.
# To pull instead of build locally, set IMAGE_TAG (e.g. IMAGE_TAG=0.1.0) and run:
#   docker compose up -d --no-build
# Or override with a docker-compose.override.yml.

services:

  # ── PostgreSQL with pgvector + pgvectorscale (DiskANN) ─────────────────────
  postgres:
    # Pinned to tested digest — update only after verifying new image
    image: timescale/timescaledb-ha:pg16@sha256:b3d038d0a0757df8a5ec0a94ba68d9ad57b0e16100a024cf4b370c77ad5645f7
    container_name: pi_agent_postgres
    restart: unless-stopped
    networks:
      - pi_agent_net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agent_kb
    volumes:
      # CRITICAL: timescale/timescaledb-ha uses PGDATA=/home/postgres/pgdata/data,
      # NOT /var/lib/postgresql/data. Mounting to the wrong path causes total
      # data loss on container recreation.
      - pgdata:/home/postgres/pgdata/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_kb"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: "256mb"

  # ── Joplin Server (note sync + agent output target) ────────────────────────
  # Desktop app: Settings → Synchronisation → Joplin Server → http://localhost:22300
  # First-run admin login: JOPLIN_ADMIN_EMAIL / JOPLIN_ADMIN_PASSWORD
  # Cloud: set JOPLIN_BASE_URL to your public domain (e.g. https://notes.example.com)
  joplin-server:
    # Pinned to tested digest — update only after verifying new image
    # NOTE: JOPLIN_SERVER_ADMIN_EMAIL is only read on FIRST startup with an
    # empty database. If you recreate postgres, run ./scripts/fix-joplin-admin.sh
    # to sync the admin email back to your .env value.
    # SECURITY: Change JOPLIN_ADMIN_PASSWORD from the default before production.
    image: joplin/server:latest@sha256:5d9e7f9d31b436cb1b99d1a6a65d8c5bf760829094617e8ad1e956fd925de888
    container_name: pi_agent_joplin
    restart: unless-stopped
    networks:
      - pi_agent_net
    ports:
      - "22300:22300"
    environment:
      APP_PORT: 22300
      APP_BASE_URL: ${JOPLIN_BASE_URL:-http://localhost:22300}
      DB_CLIENT: pg
      POSTGRES_HOST: pi_agent_postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: joplin
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JOPLIN_SERVER_ADMIN_EMAIL: ${JOPLIN_ADMIN_EMAIL:-admin@localhost}
      JOPLIN_SERVER_ADMIN_PASSWORD: ${JOPLIN_ADMIN_PASSWORD}
      JOPLIN_ADMIN_EMAIL: ${JOPLIN_ADMIN_EMAIL:-admin@pi-agent.local}
      JOPLIN_ADMIN_PASSWORD: ${JOPLIN_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy

  # ── SearXNG self-hosted meta-search ───────────────────────────────────────
  # Aggregates Google, Bing, DuckDuckGo — no API keys required.
  # JSON API at http://localhost:8080/search?q=...&format=json
  # Used by web_search tool when SEARCH_BACKEND=searxng (or as auto-fallback).
  searxng:
    # Pinned to tested digest — update only after verifying new image
    image: searxng/searxng:latest@sha256:0bbe85fb9bebe413a26c0e385c76309d15c91fdb9dc8a6bf01b35b714d0ece43
    container_name: pi_agent_searxng
    restart: unless-stopped
    networks:
      - pi_agent_net
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # ── LangGraph research agent (FastAPI) ─────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: ghcr.io/ch3w3y/parsnip-ai/agent:${IMAGE_TAG:-latest}
    container_name: pi_agent_backend
    restart: unless-stopped
    networks:
      - pi_agent_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD}@pi_agent_postgres:5432/agent_kb
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_CLOUD_URL: ${OLLAMA_CLOUD_URL:-https://ollama.com/v1}
      EMBED_MODEL: ${EMBED_MODEL:-mxbai-embed-large}
      DEFAULT_LLM: ${DEFAULT_LLM:-smart}
      RESEARCH_LLM: ${RESEARCH_LLM:-reasoning}
      FAST_MODEL: ${FAST_MODEL}
      SMART_MODEL: ${SMART_MODEL}
      REASONING_MODEL: ${REASONING_MODEL}
      GRAPH_MODEL: ${GRAPH_MODEL}
      GPU_LLM_URL: ${GPU_LLM_URL:-}
      GPU_LLM_MODEL: ${GPU_LLM_MODEL:-}
      GPU_MID_MODEL: ${GPU_MID_MODEL:-}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      SEARXNG_URL: ${SEARXNG_URL:-http://pi_agent_searxng:8080}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-auto}
      JOPLIN_SERVER_URL: ${JOPLIN_SERVER_URL:-http://pi_agent_joplin:22300}
      JOPLIN_ADMIN_EMAIL: ${JOPLIN_ADMIN_EMAIL:-admin@pi-agent.local}
      JOPLIN_ADMIN_PASSWORD: ${JOPLIN_ADMIN_PASSWORD:-}
      JOPLIN_MCP_URL: ${JOPLIN_MCP_URL:-http://pi_agent_joplin_mcp:8090}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-agentic-storage}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcs-key.json
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./gcs-key.json:/app/gcs-key.json:ro
      - ./storage:/app/storage:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      joplin-mcp:
        condition: service_started

  # ── Joplin MCP Server (agent tool bridge to Joplin) ────────────────────────
  joplin-mcp:
    build:
      context: ./joplin-mcp
      dockerfile: Dockerfile
    image: ghcr.io/ch3w3y/parsnip-ai/joplin-mcp:${IMAGE_TAG:-latest}
    container_name: pi_agent_joplin_mcp
    restart: unless-stopped
    networks:
      - pi_agent_net
    ports:
      - "8090:8090"
    environment:
      JOPLIN_DB_HOST: pi_agent_postgres
      JOPLIN_DB_PORT: "5432"
      JOPLIN_DB_NAME: joplin
      JOPLIN_DB_USER: agent
      JOPLIN_DB_PASSWORD: ${POSTGRES_PASSWORD}
      JOPLIN_OWNER_ID: ""
    depends_on:
      postgres:
        condition: service_healthy

  # ── Analysis Server (Python + R data analysis with DB access) ──────────────
  # NOTE: linux/amd64 only — upstream rocker/tidyverse does not publish arm64.
  analysis:
    build:
      context: ./analysis
      dockerfile: Dockerfile
    image: ghcr.io/ch3w3y/parsnip-ai/analysis:${IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: pi_agent_analysis
    restart: unless-stopped
    networks:
      - pi_agent_net
    environment:
      DB_HOST: pi_agent_postgres
      DB_PORT: "5432"
      DB_NAME: agent_kb
      DB_USER: agent
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JOPLIN_MCP_URL: ${JOPLIN_MCP_URL:-http://pi_agent_joplin_mcp:8090}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-agentic-storage}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcs-key.json
    volumes:
      - analysis_output:/app/output
      - ./gcs-key.json:/app/gcs-key.json:ro
      - ./storage:/app/storage:ro
    depends_on:
      postgres:
        condition: service_healthy
      joplin-mcp:
        condition: service_started

  # ── OpenWebUI Pipelines (middleware between OpenWebUI and LangGraph) ────────
  # Must start before OpenWebUI so the API endpoint is ready
  pipelines:
    # Pinned to tested digest — update only after verifying new image
    image: ghcr.io/open-webui/pipelines:main@sha256:b48e9bc338ce2be0acfbeff01810db72408a12f07739f9e3879c1f2b00952d6e
    container_name: pi_agent_pipelines
    restart: unless-stopped
    networks:
      - pi_agent_net
    ports:
      - "9099:9099"
    environment:
      PIPELINES_API_KEY: owui-pipeline-key
      PORT: "9099"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AGENT_URL: http://pi_agent_backend:8000
    volumes:
      - ./pipelines:/app/pipelines
      - pipelines_data:/app/data

  # ── Ingestion scheduler ────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    image: ghcr.io/ch3w3y/parsnip-ai/scheduler:${IMAGE_TAG:-latest}
    container_name: pi_agent_scheduler
    restart: unless-stopped
    networks:
      - pi_agent_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD}@pi_agent_postgres:5432/agent_kb
      JOPLIN_DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD}@pi_agent_postgres:5432/joplin
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EMBED_MODEL: ${EMBED_MODEL:-mxbai-embed-large}
      NEWS_API_KEY: ${NEWS_API_KEY}
      JOPLIN_SERVER_URL: ${JOPLIN_SERVER_URL:-http://pi_agent_joplin:22300}
      JOPLIN_ADMIN_EMAIL: ${JOPLIN_ADMIN_EMAIL:-admin@pi-agent.local}
      JOPLIN_ADMIN_PASSWORD: ${JOPLIN_ADMIN_PASSWORD:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-agentic-storage}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcs-key.json
    volumes:
      - ./gcs-key.json:/app/gcs-key.json:ro
      - ./ingestion/data:/app/ingestion/data
      - .:/app/project_root:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── OpenWebUI ───────────────────────────────────────────────────────────────
  openwebui:
    # Pinned to tested digest — update only after verifying new image
    image: ghcr.io/open-webui/open-webui:main@sha256:b8095f79a6a8ffad8f830bdacc9b5b0aef805689b31bca0b065cc2424d3cfaeb
    container_name: pi_agent_openwebui
    restart: unless-stopped
    networks:
      - pi_agent_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    environment:
      OPENAI_API_BASE_URL: http://pi_agent_pipelines:9099
      OPENAI_API_KEY: owui-pipeline-key
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_COMMUNITY_SHARING: "false"
      PORT: "3000"
    volumes:
      - owui_data:/app/backend/data
    depends_on:
      - pipelines

  # ── Frontend (assistant-ui / Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pi_agent_frontend
    restart: unless-stopped
    networks:
      - pi_agent_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_AGENT_URL=http://localhost:8000
      - AGENT_INTERNAL_URL=http://pi_agent_backend:8000
    depends_on:
      agent:
        condition: service_healthy

volumes:
  pgdata:
  owui_data:
  pipelines_data:
  analysis_output:

networks:
  pi_agent_net:
    driver: bridge