[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["agent", "pipelines", "analysis", "scheduler", "joplin-mcp"]
addopts = "-v --tb=short"
markers = [
    "integration: tests that require external services (agent, analysis, joplin, db)",
    "slow: tests that take >10s or call LLM APIs",
]
