[global]
# GCS repository — uses HMAC-style auth via service account JSON
repo1-type=gcs
repo1-gcs-bucket=${GCS_BUCKET}
repo1-gcs-key-type=service
repo1-gcs-key=/etc/pgbackrest/gcs-key.json
repo1-path=/pgbackrest
repo1-bundle=y
repo1-block=y

# zstd is best for postgres pages (~3x better than gzip, similar CPU to lz4)
compress-type=zst
compress-level=3

# Retention: 4 weekly fulls + their diffs + WAL since oldest full
repo1-retention-full=4
repo1-retention-full-type=count

# Performance
process-max=4
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# Async archive push (non-blocking for postgres)
archive-async=y
spool-path=/var/spool/pgbackrest
archive-push-queue-max=2GiB

[parsnip]
# Co-located: pgbackrest runs IN the postgres container, so no pg1-host
pg1-path=/home/postgres/pgdata/data
pg1-port=5432
pg1-database=agent_kb
pg1-user=agent
