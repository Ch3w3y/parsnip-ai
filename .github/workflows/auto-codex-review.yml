name: Auto Codex Review Request

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  issues: write

jobs:
  request-codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Post codex review request comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- auto-codex-review -->";
            const body = `${marker}\n@codex please review this PR.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const alreadyPosted = comments.some(c =>
              c.user?.type === "Bot" && typeof c.body === "string" && c.body.includes(marker)
            );

            if (!alreadyPosted) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Best-effort reviewer assignment (if codex is a valid reviewer)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number,
              reviewers: ["codex"]
            });
